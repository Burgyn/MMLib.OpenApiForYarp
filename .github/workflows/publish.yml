name: publish

on:
  push:
    branches:
      - main

jobs:
  ubuntu-latest:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 'Cache: .nuke/temp, ~/.nuget/packages'
        uses: actions/cache@v4
        with:
          path: |
            .nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj', '**/Directory.Packages.props') }}
      - name: 'Get NuGet token (Trusted Publishing)'
        id: nuget-token
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org" | jq -r '.value')
          NUGET_TOKEN=$(curl -s -X POST "https://www.nuget.org/packages/oidc/authorize" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"$OIDC_TOKEN\"}" | jq -r '.result')
          echo "token=$NUGET_TOKEN" >> $GITHUB_OUTPUT
      - name: 'Run: Publish'
        run: ./build.cmd Publish
        env:
          NuGetApiKey: ${{ steps.nuget-token.outputs.token }}
      - name: 'Publish: artifacts'
        uses: actions/upload-artifact@v5
        with:
          name: artifacts
          path: artifacts
